<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liquid Glass — WebGL</title>
    <link rel="stylesheet" href="./index.css" />
</head>

<body>
    <div id="bg"></div>
    <canvas id="gl"></canvas>
    <div id="dragger"></div>

    <div id="controls">
        <h2>Glass</h2>
        <label>Width
            <input type="range" id="gw" min="200" max="700" value="300" /><span class="vd" id="gw-v">300</span></label>
        <label>Height
            <input type="range" id="gh" min="200" max="800" value="200" /><span class="vd" id="gh-v">200</span></label>
        <label>Radius
            <input type="range" id="gr" min="4" max="100" value="60" /><span class="vd" id="gr-v">60</span></label>

        <h2>Refraction</h2>
        <label>Thickness
            <input type="range" id="thick" min="10" max="200" value="80" /><span class="vd"
                id="thick-v">80</span></label>
        <label>Bezel
            <input type="range" id="bezel" min="2" max="60" value="20" /><span class="vd" id="bezel-v">20</span></label>
        <label>IOR
            <input type="range" id="ior" min="1.0" max="3.0" step="0.05" value="1.5" /><span class="vd"
                id="ior-v">1.50</span></label>

        <h2>Look</h2>
        <label>Blur
            <input type="range" id="blur" min="0" max="12" step="0.5" value="1.5" /><span class="vd"
                id="blur-v">1.5</span></label>
        <label>Specular
            <input type="range" id="spec" min="0" max="1" step="0.05" value="0.55" /><span class="vd"
                id="spec-v">0.55</span></label>
        <label>Tint
            <input type="range" id="tint" min="0" max="40" value="8" /><span class="vd" id="tint-v">8%</span></label>
        <label>Shadow
            <input type="range" id="shadow" min="0" max="1" step="0.05" value="0.5" /><span class="vd"
                id="shadow-v">0.50</span></label>
    </div>

    <div class="bottom-bar">
        <span class="bottom-note">WebGL — works in all browsers</span>
        <a class="switch-btn" href="./">← Switch to SVG version</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const state = {
            x: window.innerWidth / 2,
            y: window.innerHeight / 2,
            gw: 300,
            gh: 200,
            gr: 60,
            thick: 80,
            bezel: 20,
            ior: 1.5,
            blur: 1.5,
            spec: 0.55,
            tint: 0.08,
            shadow: 0.5,
        };

        const canvas = document.getElementById('gl');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        let bgTexture = null;
        const bgUrl = 'https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&w=2000&auto=format&fit=crop';
        new THREE.TextureLoader().load(bgUrl, (tex) => {
            tex.minFilter = THREE.LinearFilter;
            tex.magFilter = THREE.LinearFilter;
            bgTexture = tex;
            material.uniforms.uBgTex.value = tex;
            material.uniforms.uBgAspect.value = tex.image.width / tex.image.height;
        });

        const vertexShader = `
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = vec4(position, 1.0);
}`;

        const fragmentShader = `
precision highp float;
varying vec2 vUv;

uniform vec2 uResolution;
uniform vec2 uGlassCenter;
uniform vec2 uGlassSize;
uniform float uRadius;
uniform float uBezel;
uniform float uThickness;
uniform float uIOR;
uniform float uBlur;
uniform float uSpecular;
uniform float uTint;
uniform float uShadow;
uniform sampler2D uBgTex;
uniform float uBgAspect;

float sdRoundedRect(vec2 p, vec2 halfSize, float r) {
  vec2 q = abs(p) - halfSize + r;
  return min(max(q.x, q.y), 0.0) + length(max(q, 0.0)) - r;
}

float surfaceHeight(float t) {
  float s = 1.0 - t;
  return pow(1.0 - s*s*s*s, 0.25);
}

vec3 sampleBg(vec2 screenUV) {
  float screenAspect = uResolution.x / uResolution.y;
  vec2 uv = screenUV;
  if (uBgAspect > screenAspect) {
    float s = screenAspect / uBgAspect;
    uv.x = uv.x * s + (1.0 - s) * 0.5;
  } else {
    float s = uBgAspect / screenAspect;
    uv.y = uv.y * s + (1.0 - s) * 0.5;
  }
  uv.y = 1.0 - uv.y;
  return texture2D(uBgTex, uv).rgb;
}

vec3 sampleBgBlurred(vec2 uv, float radius) {
  if (radius < 0.5) return sampleBg(uv);
  vec3 sum = vec3(0.0);
  vec2 px = 1.0 / uResolution;
  vec2 offsets[16];
  offsets[0]  = vec2(-0.94201, -0.39906);
  offsets[1]  = vec2( 0.94558, -0.76890);
  offsets[2]  = vec2(-0.09418, -0.92938);
  offsets[3]  = vec2( 0.34495,  0.29387);
  offsets[4]  = vec2(-0.91588, -0.45771);
  offsets[5]  = vec2(-0.81544,  0.48568);
  offsets[6]  = vec2(-0.38277, -0.56071);
  offsets[7]  = vec2(-0.12675,  0.84686);
  offsets[8]  = vec2( 0.89642,  0.41254);
  offsets[9]  = vec2( 0.18150, -0.30020);
  offsets[10] = vec2(-0.01445, -0.16001);
  offsets[11] = vec2( 0.59614,  0.71118);
  offsets[12] = vec2( 0.49742, -0.47280);
  offsets[13] = vec2( 0.80685,  0.04588);
  offsets[14] = vec2(-0.32490, -0.03965);
  offsets[15] = vec2(-0.60975,  0.06566);
  for (int i = 0; i < 16; i++) {
    sum += sampleBg(uv + offsets[i] * radius * px);
  }
  return sum / 16.0;
}

void main() {
  vec2 screenPx = vec2(vUv.x, 1.0 - vUv.y) * uResolution;
  vec2 p = screenPx - uGlassCenter;
  vec2 halfSize = uGlassSize * 0.5;

  float sd = sdRoundedRect(p, halfSize, uRadius);

  if (sd > 0.0) {
    float shadowFalloff = exp(-sd * sd / 800.0);
    float shadowAlpha = uShadow * shadowFalloff * 0.6;
    gl_FragColor = vec4(0.0, 0.0, 0.0, shadowAlpha);
    return;
  }

  float distFromEdge = -sd;
  float bezel = min(uBezel, min(uRadius, min(halfSize.x, halfSize.y)) - 1.0);
  float t = clamp(distFromEdge / bezel, 0.0, 1.0);

  float h = surfaceHeight(t);
  float dt = 0.001;
  float h2 = surfaceHeight(min(t + dt, 1.0));
  float dh = (h2 - h) / dt;

  float slopeAngle = atan(dh * (uThickness / bezel));
  float sinR = sin(slopeAngle) / uIOR;
  sinR = clamp(sinR, -1.0, 1.0);
  float thetaR = asin(sinR);
  float displacement = h * uThickness * (tan(slopeAngle) - tan(thetaR));

  vec2 grad;
  float eps = 0.5;
  grad.x = sdRoundedRect(p + vec2(eps, 0.0), halfSize, uRadius) - sd;
  grad.y = sdRoundedRect(p + vec2(0.0, eps), halfSize, uRadius) - sd;
  grad = normalize(grad);

  vec2 offset = -grad * displacement / uResolution;

  vec2 screenUV = screenPx / uResolution;
  vec2 refractedUV = screenUV + offset;

  vec3 color = sampleBgBlurred(refractedUV, uBlur);

  // Specular
  vec2 lightDir = normalize(vec2(0.5, -0.7));
  float rimDot = abs(dot(grad, lightDir));
  float rimFalloff = 1.0 - smoothstep(0.0, bezel * 0.4, distFromEdge);
  float specHighlight = pow(rimDot * rimFalloff, 1.5);
  color += vec3(specHighlight * uSpecular);

  // Inner shadow
  float innerShadow = 1.0 - smoothstep(0.0, bezel * 0.6, distFromEdge);
  color *= mix(1.0, 0.7, innerShadow * 0.3);

  // Inner rim
  float innerRim = smoothstep(0.0, 2.0, distFromEdge) * (1.0 - smoothstep(2.0, 5.0, distFromEdge));
  color += vec3(innerRim * 0.15 * uSpecular);

  // Tint
  color = mix(color, vec3(1.0), uTint);

  // AA
  float alpha = smoothstep(0.0, 1.5, distFromEdge);
  gl_FragColor = vec4(color, alpha);
}`;

        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                uGlassCenter: { value: new THREE.Vector2(state.x, state.y) },
                uGlassSize: { value: new THREE.Vector2(state.gw, state.gh) },
                uRadius: { value: state.gr },
                uBezel: { value: state.bezel },
                uThickness: { value: state.thick },
                uIOR: { value: state.ior },
                uBlur: { value: state.blur },
                uSpecular: { value: state.spec },
                uTint: { value: state.tint },
                uShadow: { value: state.shadow },
                uBgTex: { value: null },
                uBgAspect: { value: 1.5 },
            },
            transparent: true,
            depthTest: false,
        });

        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

        function render() {
            const u = material.uniforms;
            u.uResolution.value.set(window.innerWidth, window.innerHeight);
            u.uGlassCenter.value.set(state.x, state.y);
            u.uGlassSize.value.set(state.gw, state.gh);
            u.uRadius.value = state.gr;
            u.uBezel.value = state.bezel;
            u.uThickness.value = state.thick;
            u.uIOR.value = state.ior;
            u.uBlur.value = state.blur;
            u.uSpecular.value = state.spec;
            u.uTint.value = state.tint;
            u.uShadow.value = state.shadow;
            renderer.render(scene, camera);
            requestAnimationFrame(render);
        }
        render();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const dragger = document.getElementById('dragger');
        function syncDragger() {
            dragger.style.left = state.x - state.gw / 2 + 'px';
            dragger.style.top = state.y - state.gh / 2 + 'px';
            dragger.style.width = state.gw + 'px';
            dragger.style.height = state.gh + 'px';
            dragger.style.borderRadius = state.gr + 'px';
        }
        syncDragger();

        (function () {
            let sx, sy;
            dragger.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                sx = e.clientX;
                sy = e.clientY;
                document.addEventListener('pointermove', onMove);
                document.addEventListener('pointerup', () => document.removeEventListener('pointermove', onMove), { once: true });
            });
            function onMove(e) {
                e.preventDefault();
                state.x += e.clientX - sx;
                state.y += e.clientY - sy;
                sx = e.clientX;
                sy = e.clientY;
                syncDragger();
            }
        })();

        const CTRLS = [
            ['gw', 'gw', (v) => Math.round(v)],
            ['gh', 'gh', (v) => Math.round(v)],
            ['gr', 'gr', (v) => Math.round(v)],
            ['thick', 'thick', (v) => Math.round(v)],
            ['bezel', 'bezel', (v) => Math.round(v)],
            ['ior', 'ior', (v) => (+v).toFixed(2)],
            ['blur', 'blur', (v) => (+v).toFixed(1)],
            ['spec', 'spec', (v) => (+v).toFixed(2)],
            ['tint', 'tint', (v) => Math.round(v) + '%'],
            ['shadow', 'shadow', (v) => (+v).toFixed(2)],
        ];
        CTRLS.forEach(([id, key, fmt]) => {
            const el = document.getElementById(id);
            el.addEventListener('input', () => {
                const raw = +el.value;
                state[key] = key === 'tint' ? raw / 100 : raw;
                document.getElementById(id + '-v').textContent = fmt(el.value);
                syncDragger();
            });
        });
    </script>
</body>

</html>
